# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃              Liquid Glass - Animations                       ┃
# ┃         Smooth, subtle, Apple-inspired animations            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

animations {
    enabled = true

    # Bezier curves for smooth Apple-like motion
    # Default ease-out
    bezier = easeOut, 0.25, 1, 0.5, 1
    # Smooth deceleration
    bezier = smooth, 0.4, 0, 0.2, 1
    # Snappy with soft landing
    bezier = snappy, 0.2, 0.9, 0.3, 1
    # Gentle bounce
    bezier = gentle, 0.4, 0, 0, 1
    # Quick start, soft end
    bezier = glass, 0.2, 0.8, 0.2, 1

    # Window animations
    animation = windows, 1, 4, glass, slide
    animation = windowsIn, 1, 4, glass, slide
    animation = windowsOut, 1, 3, easeOut, slide
    animation = windowsMove, 1, 3, smooth

    # Fade animations
    animation = fade, 1, 3, smooth
    animation = fadeIn, 1, 3, gentle
    animation = fadeOut, 1, 2, easeOut

    # Border animations
    animation = border, 1, 4, smooth
    animation = borderangle, 1, 50, smooth, loop

    # Workspace animations
    animation = workspaces, 1, 4, glass, slide
    animation = specialWorkspace, 1, 4, glass, slidevert

    # Layer animations (for EWW, rofi, etc.)
    animation = layers, 1, 5, glass, popin 80%
    animation = layersIn, 1, 5, glass, popin 80%
    animation = layersOut, 1, 3, easeOut, popin 80%
}
