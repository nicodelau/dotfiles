# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Animations Configuration                 ┃
# ┃                      Liquid Glass Theme                     ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# https://wiki.hyprland.org/Configuring/Animations/

animations {
    enabled = yes

    # Bezier curves para diferentes efectos
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = linear, 0, 0, 1, 1
    bezier = glass, 0.22, 1, 0.36, 1
    bezier = bounce, 0.68, -0.55, 0.265, 1.55

    # Ventanas entrando
    animation = windowsIn, 1, 5, glass, popin 80%
    animation = windowsOut, 1, 5, smoothOut, popin 80%
    animation = windowsMove, 1, 4, glass

    # Fade para ventanas y widgets
    animation = fadeIn, 1, 4, smoothIn
    animation = fadeOut, 1, 4, smoothOut
    animation = fadeSwitch, 1, 5, smoothIn
    animation = fadeShadow, 1, 5, smoothIn
    animation = fadeDim, 1, 5, smoothIn
    animation = fadeLayers, 1, 4, glass

    # Bordes
    animation = border, 1, 10, default
    animation = borderangle, 1, 100, linear, loop

    # WORKSPACES - Fade In/Out suave tipo liquid glass
    animation = workspaces, 1, 5, glass, fade
    animation = specialWorkspace, 1, 5, glass, slidefadevert -50%
}
