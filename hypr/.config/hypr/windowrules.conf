# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                     Windowrules V2                          ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# --- REGLAS FLOTANTES (Float Necessary Windows) ---
# IMPORTANTE: Usamos 'windowrulev2' para todo. 
# 'windowrule' viejo NO soporta selectores como class: o title:

windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = float, title:^(Picture in picture)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, class:^(LibreWolf)$,title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(xdg-desktop-portal-.*)$
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.kde.polkit-kde-authentication-agent-1)(.*)$
windowrulev2 = float, class:^(CachyOSHello)$
windowrulev2 = float, class:^(zenity)$
windowrulev2 = float, class:^(Steam)$,title:^(Steam - Self Updater)$

# --- OPACIDAD ---
# Sintaxis V2: opacity [active] [inactive]
windowrulev2 = opacity 0.92 0.92, class:^(thunar|nemo)$
windowrulev2 = opacity 0.96 0.96, class:^(discord|armcord|webcord)$
windowrulev2 = opacity 0.95 0.95, title:^(QQ|Telegram)$
windowrulev2 = opacity 0.95 0.95, title:^(NetEase Cloud Music Gtk4)$

# --- GENERAL ---
# Picture-in-Picture logic
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = size 960 540, title:^(Picture-in-Picture)$
windowrulev2 = move 25%-, title:^(Picture-in-Picture)$

# Apps multimedia y herramientas
windowrulev2 = float, class:^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrulev2 = move 25%-, class:^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrulev2 = size 960 540, class:^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$

windowrulev2 = pin, title:^(danmufloat)$
windowrulev2 = rounding 5, title:^(danmufloat|termfloat)$
windowrulev2 = animation slide right, class:^(kitty|Alacritty)$
windowrulev2 = noblur, class:^(org.mozilla.firefox)$

# --- DECORACIONES POR WORKSPACE ---
# CORRECCIÓN CRÍTICA: 
# 1. Cambiado a windowrulev2
# 2. 'floating:1' cambiado a selector 'floating'
# 3. 'onworkspace:' cambiado a 'workspace:' (sintaxis actual)

# Decoraciones para ventanas FLOTANTES en workspaces w[fv1-10]
windowrulev2 = bordersize 2, floating, workspace:w[fv1-10]
windowrulev2 = bordercolor $cachylblue, floating, workspace:w[fv1-10]
windowrulev2 = rounding 8, floating, workspace:w[fv1-10]

# Decoraciones para ventanas TILING (mosaico) en workspaces f[1-10]
# Usamos 'tiled' en lugar de 'floating:0' para evitar errores de parser
windowrulev2 = bordersize 3, tiled, workspace:f[1-10]
windowrulev2 = rounding 4, tiled, workspace:f[1-10]

# -----------------------------------------------------
# Workspaces Rules
# -----------------------------------------------------

workspace = w[tv1-10], gapsout:5, gapsin:3
workspace = f[1], gapsout:5, gapsin:3

