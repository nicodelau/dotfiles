# ┃              Liquid Glass - Autostart                        ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Kill existing instances and restart
exec-once = killall -q dunst; dunst &
exec-once = killall -q swww-daemon; swww-daemon &

# Restore last wallpaper or set default
exec-once = sleep 0.5 && ~/.config/hypr/scripts/restore-wallpaper.sh

# Start EWW daemon and workspace indicator (follows active monitor)
exec-once = sleep 1 && eww daemon && ~/.config/hypr/scripts/workspace-indicator.sh &

# Clipboard manager
exec-once = wl-paste --watch cliphist store

# Idle handler - locks screen after 5 min, turns off display after 10 min
exec-once = hypridle
