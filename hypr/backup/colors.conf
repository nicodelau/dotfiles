# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃              Liquid Glass Color Palette                     ┃
# ┃         Unified color system for all components             ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Primary Colors (Hex for Hyprland)
$glass_bg = rgba(20, 20, 30, 0.65)
$glass_bg_solid = rgb(20, 20, 30)
$glass_border = rgba(255, 255, 255, 0.12)
$glass_border_active = rgba(255, 255, 255, 0.25)

# Text Colors
$text_primary = rgba(255, 255, 255, 1.0)
$text_secondary = rgba(255, 255, 255, 0.7)
$text_muted = rgba(255, 255, 255, 0.4)

# Accent Colors (Apple-inspired blue)
$accent_primary = rgba(0A84FFff)
$accent_secondary = rgba(100, 180, 255, 1.0)
$accent_glow = rgba(10, 132, 255, 0.3)

# Status Colors
$color_success = rgba(48, 209, 88, 1.0)
$color_warning = rgba(255, 214, 10, 1.0)
$color_error = rgba(255, 69, 58, 1.0)

# Hyprland specific (hex without alpha for some settings)
$col_active_border = rgba(0A84FFaa)
$col_inactive_border = rgba(ffffff15)

# General settings
general {
    col.active_border = $col_active_border
    col.inactive_border = $col_inactive_border
    gaps_in = 0
    gaps_out = 8
    border_size = 1
}
