# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃              Liquid Glass - Hyprlock                         ┃
# ┃         Glassmorphic lock screen configuration               ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

general {
    hide_cursor = true
    grace = 3
    no_fade_in = false
    no_fade_out = false
}

# ── Background ────────────────────────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# ── Clock ─────────────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.95)
    font_size = 96
    font_family = SF Pro Display Bold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
    shadow_boost = 1.0
}

# ── Date ──────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %d de %B"
    color = rgba(255, 255, 255, 0.7)
    font_size = 22
    font_family = SF Pro Display
    position = 0, 110
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.4)
}

# ── User greeting ────────────────────────────────────────────────
label {
    monitor =
    text = Hola, $USER
    color = rgba(255, 255, 255, 0.6)
    font_size = 16
    font_family = SF Pro Display
    position = 0, -40
    halign = center
    valign = center
}

# ── Password input ───────────────────────────────────────────────
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(255, 255, 255, 0.12)
    inner_color = rgba(20, 20, 30, 0.65)
    font_color = rgba(255, 255, 255, 0.95)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <span foreground="##ffffff70">Contrasena...</span>
    hide_input = false
    rounding = 14
    check_color = rgba(10, 132, 255, 0.8)
    fail_color = rgba(255, 69, 58, 0.8)
    fail_text = <span foreground="##ff453a">Intenta de nuevo</span>
    fail_transition = 300
    capslock_color = rgba(255, 214, 10, 0.8)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -110
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.3)
}

# ── Lock icon ─────────────────────────────────────────────────────
label {
    monitor =
    text = 󰌾
    color = rgba(255, 255, 255, 0.4)
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    position = 0, -170
    halign = center
    valign = center
}
