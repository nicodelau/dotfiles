# ┃              Liquid Glass - Decorations                      ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/colors.conf

decoration {
    # Transparency
    active_opacity = 0.95
    inactive_opacity = 0.88
    fullscreen_opacity = 1.0

    # Rounded corners
    rounding = 10 

    # Blur
    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        vibrancy_darkness = 0.0
        xray = false
        new_optimizations = true
        special = true
        popups = true
    }

    # Shadow (v0.53+ syntax)
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = 0x59000000
        color_inactive = 0x33000000
    }

    # Dim inactive
    dim_inactive = true
    dim_strength = 0.08
}

