# Custom Kitty Terminal Configuration
# Generated by Antigravity

# --- Window Aesthetics ---
# Background opacity (0.0 to 1.0)
background_opacity 0.85

# Background blur (requires a supporting compositor on Linux)
background_blur 15

# Window padding
window_padding_width 10

# Disable window decorations (optional, uncomment to enable borderless)
# hide_window_decorations yes

# --- Color Scheme (Sleek Slate Blue / Tokyo Night inspired) ---
background            #0f172a
foreground            #e2e8f0
selection_background  #1e293b
selection_foreground  #f8fafc

# Cursor
cursor                #38bdf8
cursor_text_color     #0f172a

# The 16 terminal colors
# Black
color0  #1e293b
color8  #475569
# Red
color1  #f43f5e
color9  #fda4af
# Green
color2  #10b981
color10 #6ee7b7
# Yellow
color3  #f59e0b
color11 #fde047
# Blue
color4  #3b82f6
color12 #93c5fd
# Magenta
color5  #8b5cf6
color13 #c4b5fd
# Cyan
color6  #06b6d4
color14 #67e8f9
# White
color7  #cbd5e1
color15 #f8fafc

# --- Tab Bar Aesthetics ---
tab_bar_style powerline
tab_powerline_style angled
active_tab_foreground   #0f172a
active_tab_background   #38bdf8
active_tab_font_style   bold
inactive_tab_foreground #94a3b8
inactive_tab_background #1e293b
inactive_tab_font_style normal

# --- Performance & Misc ---
update_check_interval 0
detect_urls yes

# --- Startup Program ---
# Start Kitty directly with Tmux
shell tmux
