# Custom Tmux Configuration
# Generated by Antigravity

# --- General Settings ---
# Enable mouse support (clicking, resizing, scrolling)
set -g mouse on

# Increase history limit
set -g history-limit 10000

# Fix terminal color compatibility
set -g default-terminal "xterm-256color"
set-option -sa terminal-overrides ",xterm-256color:Tc"

# --- 1-Indexing Settings ---
# Start window indexing at 1 instead of 0
set -g base-index 1

# Start pane indexing at 1 instead of 0
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# --- Custom Shortcuts ---
# Change prefix command (optional, uncomment if you prefer Ctrl-a)
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Reload configuration easily
bind r source-file ~/.tmux.conf \; display "Tmux configuration reloaded!"

# Split panes using | and - (and open in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt + Arrow keys WITHOUT prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch windows using Shift + Arrow keys WITHOUT prefix
bind -n S-Left  previous-window
bind -n S-Right next-window

# Custom app launcher shortcuts (prefix + i, then c, g, or o)
bind-key i switch-client -T prefix-i
bind-key -T prefix-i c new-window -c "#{pane_current_path}" "claude"
bind-key -T prefix-i g new-window -c "#{pane_current_path}" "agy"
bind-key -T prefix-i o new-window -c "#{pane_current_path}" "opencode"

# Open nvim in a new window in the current directory (prefix + v)
bind v new-window -c "#{pane_current_path}" "nvim"

# --- Status Bar & Aesthetics ---
# Refresh status interval
set -g status-interval 5

# Custom slate blue theme to match Kitty
set -g status-style bg=#1e293b,fg=#e2e8f0

# Left status (Session name)
set -g status-left-length 40
set -g status-left "#[fg=#38bdf8,bold] #S #[fg=#475569]| "

# Right status (Time and Hostname)
set -g status-right-length 60
set -g status-right "#[fg=#94a3b8]%Y-%m-%d %H:%M #[fg=#38bdf8,bold]#H "

# Window status tabs
set -g window-status-current-style bg=#38bdf8,fg=#0f172a,bold
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "

# Pane borders
set -g pane-border-style fg=#1e293b
set -g pane-active-border-style fg=#38bdf8
